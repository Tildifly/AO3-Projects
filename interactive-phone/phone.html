                        <img id="menu-icon" src="https://cdn-icons-png.flaticon.com/512/483/483345.png" 
                        onclick="ActivegoogleMenuPopup()"
                        alt="menu">
                    </div>
                </div>
                <img id="google-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1280px-Google_2015_logo.svg.png" 
                alt="google-logo">
                <div id="searchbar"></div>

                <div id="googleMenuPopup">
                    <img id="history-icon" src="https://cdn-icons-png.freepik.com/512/565/565584.png" 
                    alt="search-history-icon">
                    <p>history</p>
                </div>

            <div id="homebutton" onclick="activeHomescreen()"></div>
